version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: bus-booking-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: bus-booking
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - bus-booking-network

  mongo-express:
    image: mongo-express:latest
    container_name: bus-booking-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      - mongodb
    networks:
      - bus-booking-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  bus-booking-network:
    driver: bridge
